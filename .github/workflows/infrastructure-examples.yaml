name: Infrastructure Example Apps

# Builds the example frontend + backend images for the infrastructure provider's
# "application" 3-tier demo template. The template's sampleValues point the
# provision form at these images on :latest, so a one-click demo always pulls a
# current build. On PRs the images are built (single-arch) but NOT pushed, so a
# broken Dockerfile/app is caught before it reaches :latest.
on:
  push:
    branches: [main]
    paths:
      - 'providers/infrastructure/examples/application/apps/**'
      - '.github/workflows/infrastructure-examples.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'providers/infrastructure/examples/application/apps/**'
      - '.github/workflows/infrastructure-examples.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            image: ${{ github.repository_owner }}/kedge-infrastructure-example-frontend
          - name: backend
            image: ${{ github.repository_owner }}/kedge-infrastructure-example-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          # :latest on the default branch, plus an immutable short-sha tag.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./providers/infrastructure/examples/application/apps/${{ matrix.name }}
          file: ./providers/infrastructure/examples/application/apps/${{ matrix.name }}/Dockerfile
          # Multi-arch on push to main; single-arch build-only on PRs.
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
