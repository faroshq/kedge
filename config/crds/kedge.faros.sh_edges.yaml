---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: edges.kedge.faros.sh
spec:
  group: kedge.faros.sh
  names:
    kind: Edge
    listKind: EdgeList
    plural: edges
    singular: edge
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.connected
      name: Connected
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - jsonPath: .status.agentVersion
      name: Agent Version
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: "Edge represents a managed connection endpoint — either a Kubernetes
          cluster\nor a bare-metal/VM server accessible via SSH.\n\nAgents register
          via:\n\n\t/services/agent-proxy/{cluster}/apis/kedge.faros.sh/v1alpha1/edges/{name}/proxy\n\nUsers
          access edges via:\n\n\t/services/edges-proxy/clusters/{cluster}/apis/kedge.faros.sh/v1alpha1/edges/{name}/k8s
          \ (type=kubernetes)\n\t/services/edges-proxy/clusters/{cluster}/apis/kedge.faros.sh/v1alpha1/edges/{name}/ssh
          \ (type=server)"
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: EdgeSpec defines the desired state of an Edge.
            properties:
              kubernetes:
                description: |-
                  Kubernetes holds configuration specific to Kubernetes cluster edges.
                  Only valid when type=kubernetes.
                properties:
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels for scheduling hints (region, provider, etc.)
                    type: object
                type: object
              server:
                description: |-
                  Server holds configuration specific to SSH server-mode edges.
                  Only valid when type=server.
                properties:
                  sshCredentialsRef:
                    description: |-
                      SSHCredentialsRef references a Secret with admin-configured SSH credentials.
                      Used when sshUserMapping=provided, or as the key source for identity mode.
                      The Secret must contain: "username" (string) and one of "privateKey" or "password".
                    properties:
                      name:
                        description: name is unique within a namespace to reference
                          a secret resource.
                        type: string
                      namespace:
                        description: namespace defines the space within which the
                          secret name must be unique.
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  sshKeySecretRef:
                    description: |-
                      SSHKeySecretRef references a Secret containing the SSH private key (key: id_rsa).
                      When set, the hub serves this key to authenticated CLI clients via the /ssh subresource.
                    properties:
                      name:
                        description: name is unique within a namespace to reference
                          a secret resource.
                        type: string
                      namespace:
                        description: namespace defines the space within which the
                          secret name must be unique.
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  sshPort:
                    default: 22
                    description: 'SSHPort is the port sshd listens on inside the remote
                      host (default: 22).'
                    type: integer
                  sshUserMapping:
                    default: inherited
                    description: |-
                      SSHUserMapping controls how the SSH username is determined for callers.
                      inherited: use credentials reported by the agent at registration (default).
                      provided:  use credentials from spec.server.sshCredentialsRef Secret.
                      identity:  use the caller's kcp/OIDC username; key from sshCredentialsRef.
                    enum:
                    - inherited
                    - provided
                    - identity
                    type: string
                type: object
              type:
                description: Type discriminates between Kubernetes cluster and SSH
                  server edges.
                enum:
                - kubernetes
                - server
                type: string
            required:
            - type
            type: object
            x-kubernetes-validations:
            - message: kubernetes field is only valid when type=kubernetes
              rule: self.type == 'kubernetes' || !has(self.kubernetes)
            - message: server field is only valid when type=server
              rule: self.type == 'server' || !has(self.server)
          status:
            description: EdgeStatus defines the observed state of an Edge.
            properties:
              URL:
                description: |-
                  URL is the proxy URL path for accessing this edge via the hub.
                  Format: /clusters/{cluster}/apis/kedge.faros.sh/v1alpha1/edges/{name}
                  For kubernetes edges, append /k8s/ for K8s API proxy.
                  For server edges, append /ssh for SSH WebSocket terminal.
                type: string
              agentVersion:
                description: |-
                  AgentVersion is the version string of the kedge binary running on the edge agent.
                  Set by the agent at startup and periodically refreshed. Empty for agents that
                  have not yet reported (backwards compatible).
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of the edge's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              connected:
                description: |-
                  Connected indicates whether the edge agent currently has an active tunnel.
                  No `omitempty`: `false` must serialize so controller-runtime PUT-replace
                  updates don't drop the field and blank the CRD print column.
                type: boolean
              hostname:
                description: Hostname is the hostname reported by the connected edge
                  agent.
                type: string
              joinToken:
                description: |-
                  JoinToken is a bootstrap token for agent registration. Generated by the hub
                  controller when the Edge is first created. The agent presents this token on
                  its first WebSocket connection to authenticate without a full kubeconfig.
                  Cleared once the agent completes registration.
                type: string
              labels:
                additionalProperties:
                  type: string
                description: Labels are propagated from the edge agent (e.g. region,
                  provider tags).
                type: object
              phase:
                description: Phase describes the current lifecycle phase of the Edge.
                type: string
              sshCredentials:
                description: |-
                  SSHCredentials holds the SSH authentication credentials for server-type edges.
                  This is set by the agent and used by the hub for SSH connections.
                properties:
                  passwordSecretRef:
                    description: |-
                      PasswordSecretRef references a Secret containing the SSH password.
                      The secret must have a key named "password".
                    properties:
                      name:
                        description: name is unique within a namespace to reference
                          a secret resource.
                        type: string
                      namespace:
                        description: namespace defines the space within which the
                          secret name must be unique.
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  privateKeySecretRef:
                    description: |-
                      PrivateKeySecretRef references a Secret containing the SSH private key.
                      The secret must have a key named "privateKey".
                    properties:
                      name:
                        description: name is unique within a namespace to reference
                          a secret resource.
                        type: string
                      namespace:
                        description: namespace defines the space within which the
                          secret name must be unique.
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  username:
                    description: Username is the SSH username to authenticate as.
                    type: string
                required:
                - username
                type: object
              sshHostKey:
                description: |-
                  SSHHostKey is the SSH host public key reported by the agent at registration
                  time (authorized_keys format, e.g. "ssh-ed25519 AAAA...").
                  Used by the hub to verify the agent's sshd identity and prevent MITM attacks.
                type: string
            required:
            - connected
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
