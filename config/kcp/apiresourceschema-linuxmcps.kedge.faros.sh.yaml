apiVersion: apis.kcp.io/v1alpha1
kind: APIResourceSchema
metadata:
  name: v260520-e404e14.linuxmcps.kedge.faros.sh
spec:
  group: kedge.faros.sh
  names:
    kind: LinuxMCP
    listKind: LinuxMCPList
    plural: linuxmcps
    shortNames:
    - lmcp
    singular: linuxmcp
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.URL
      name: URL
      type: string
    - jsonPath: .status.connectedEdges
      name: ConnectedEdges
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      description: |-
        LinuxMCP represents a multi-edge MCP (Model Context Protocol) server for a
        set of server-type (SSH) edges matched by a label selector.  Users point
        MCP-compatible AI clients at the URL to drive shell/system tools across all
        matching connected edges over the hub's reverse-tunnel SSH path.
      properties:
        apiVersion:
          description: |-
            APIVersion defines the versioned schema of this representation of an object.
            Servers should convert recognized schemas to the latest internal value, and
            may reject unrecognized values.
            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
          type: string
        kind:
          description: |-
            Kind is a string value representing the REST resource this object represents.
            Servers may infer this from the endpoint the client submits requests to.
            Cannot be updated.
            In CamelCase.
            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
          type: string
        metadata:
          type: object
        spec:
          description: LinuxMCPSpec defines the desired state of LinuxMCP.
          properties:
            commandTimeoutSeconds:
              description: |-
                CommandTimeoutSeconds bounds the wall-clock time any single command may
                run on a target edge.  Defaults to 30s.  Hard maximum is 600s.
              format: int32
              maximum: 600
              minimum: 1
              type: integer
            edgeSelector:
              description: |-
                EdgeSelector selects which server-type edges to include in this MCP server.
                An empty selector matches all connected server-type edges.
                Kubernetes-type edges are always excluded — use KubernetesMCP for those.
              properties:
                matchExpressions:
                  description: matchExpressions is a list of label selector requirements.
                    The requirements are ANDed.
                  items:
                    description: |-
                      A label selector requirement is a selector that contains values, a key, and an operator that
                      relates the key and values.
                    properties:
                      key:
                        description: key is the label key that the selector applies
                          to.
                        type: string
                      operator:
                        description: |-
                          operator represents a key's relationship to a set of values.
                          Valid operators are In, NotIn, Exists and DoesNotExist.
                        type: string
                      values:
                        description: |-
                          values is an array of string values. If the operator is In or NotIn,
                          the values array must be non-empty. If the operator is Exists or DoesNotExist,
                          the values array must be empty. This array is replaced during a strategic
                          merge patch.
                        items:
                          type: string
                        type: array
                        x-kubernetes-list-type: atomic
                    required:
                    - key
                    - operator
                    type: object
                  type: array
                  x-kubernetes-list-type: atomic
                matchLabels:
                  additionalProperties:
                    type: string
                  description: |-
                    matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                    map is equivalent to an element of matchExpressions, whose key field is "key", the
                    operator is "In", and the values array contains only "value". The requirements are ANDed.
                  type: object
              type: object
              x-kubernetes-map-type: atomic
            maxOutputBytes:
              description: |-
                MaxOutputBytes caps the combined stdout+stderr returned per tool call.
                Output beyond this is truncated and a flag is set in the response.
                Defaults to 1 MiB (1048576).  Hard maximum is 16 MiB.
              format: int32
              maximum: 16777216
              minimum: 1024
              type: integer
            readOnly:
              description: |-
                ReadOnly disables every mutating tool (write_file, package install,
                systemctl restart, etc.) when true.  Read-only inspection tools remain
                available.
              type: boolean
            toolsets:
              description: |-
                Toolsets defines which Linux MCP toolsets to enable.
                Valid names are defined by the in-tree linuxmcp toolset registry
                (e.g. "core", "systemd", "diag", "net", "pkg").
                Defaults to ["core"] if empty.
              items:
                type: string
              type: array
          type: object
        status:
          description: LinuxMCPStatus defines the observed state of LinuxMCP.
          properties:
            URL:
              description: URL is the MCP endpoint URL at which this server is reachable.
              type: string
            conditions:
              description: Conditions describe the current state of the LinuxMCP resource.
              items:
                description: Condition contains details for one aspect of the current
                  state of this API Resource.
                properties:
                  lastTransitionTime:
                    description: |-
                      lastTransitionTime is the last time the condition transitioned from one status to another.
                      This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                    format: date-time
                    type: string
                  message:
                    description: |-
                      message is a human readable message indicating details about the transition.
                      This may be an empty string.
                    maxLength: 32768
                    type: string
                  observedGeneration:
                    description: |-
                      observedGeneration represents the .metadata.generation that the condition was set based upon.
                      For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                      with respect to the current state of the instance.
                    format: int64
                    minimum: 0
                    type: integer
                  reason:
                    description: |-
                      reason contains a programmatic identifier indicating the reason for the condition's last transition.
                      Producers of specific condition types may define expected values and meanings for this field,
                      and whether the values are considered a guaranteed API.
                      The value should be a CamelCase string.
                      This field may not be empty.
                    maxLength: 1024
                    minLength: 1
                    pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                    type: string
                  status:
                    description: status of the condition, one of True, False, Unknown.
                    enum:
                    - "True"
                    - "False"
                    - Unknown
                    type: string
                  type:
                    description: type of condition in CamelCase or in foo.example.com/CamelCase.
                    maxLength: 316
                    pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                    type: string
                required:
                - lastTransitionTime
                - message
                - reason
                - status
                - type
                type: object
              type: array
            connectedEdges:
              description: |-
                ConnectedEdges is the number of currently connected server-type edges
                matching the selector.
              type: integer
          type: object
      type: object
    served: true
    storage: true
    subresources:
      status: {}
