apiVersion: tenancy.kcp.io/v1alpha1
kind: WorkspaceType
metadata:
  name: workspace
  annotations:
    bootstrap.kcp.io/create-only: "true"
spec:
  # Workspaces ("team" workspaces) hold APIBindings, edges, mcp instances,
  # and any other tenant work. The ONLY child type they may host is `edge`:
  # the edge mount reconciler creates an `edge` workspace per kubernetes Edge
  # so users can navigate into the remote cluster through kcp. Arbitrary
  # nested team workspaces are still deferred to v2 per
  # docs/organizations.md §Open questions — capping the allowed child type to
  # `edge` keeps a tenant kubectl-apply from creating anything else, while an
  # `edge` workspace itself is an empty, leaf-only mount point (see
  # workspacetype-edge.yaml). A tenant with cluster-admin in their team
  # workspace can create an `edge` workspace by hand, but it carries no local
  # API surface, so the blast radius is a dangling mount, not a usable
  # workspace tree.
  limitAllowedChildren:
    types:
    - name: edge
      path: root:kedge
  # workspace workspaces must be children of a `kedge-organization` workspace —
  # they only make sense as a team inside an Org. The kcp WorkspaceType
  # admission rejects an attempt to create one at any other path.
  limitAllowedParents:
    types:
    - name: kedge-organization
      path: root:kedge
  # Deliberately no `extend: universal` and no defaultAPIBindings:
  #   * Universal would pull tenancy.kcp.io (Workspace/WorkspaceType) and
  #     topology.kcp.io into the tenant's namespace, letting them spawn
  #     arbitrary child workspaces and inspect cluster topology — both
  #     are kedge-system surfaces, not tenant surfaces.
  #   * tenants.kedge.faros.sh (Membership / Organization / User /
  #     UserMembershipIndex) is also a system primitive: tenants care
  #     about edges, MCPServers, and Placements, not about org/user
  #     plumbing. Membership management goes through the portal/hub
  #     using admin creds, not via the tenant's kubectl.
  # The trade-off: no `default` namespace is auto-created, so `kubectl
  # get pods` (without -n) fails with `namespaces "default" not found`.
  # Only cluster-scoped CRDs from the kedge APIBinding (Edge / MCPServer /
  # Placement / VirtualWorkload) are reachable without -n; everything
  # else needs an explicit namespace the user creates themselves.
  # The kedge APIBinding (core.faros.sh) is added imperatively by the
  # organization bootstrap controller (Step G) so the permission claims
  # for secrets / namespaces / configmaps / serviceaccounts / clusterroles
  # / clusterrolebindings are accepted at bind time.
