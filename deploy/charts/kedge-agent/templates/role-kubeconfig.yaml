{{- if .Values.agent.hub.token }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kedge-agent.fullname" . }}-kubeconfig
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kedge-agent.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["kedge-agent-{{ .Values.agent.edgeName }}-kubeconfig"]
  verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kedge-agent.fullname" . }}-kubeconfig
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kedge-agent.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "kedge-agent.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "kedge-agent.fullname" . }}-kubeconfig
  apiGroup: rbac.authorization.k8s.io
{{- end }}
