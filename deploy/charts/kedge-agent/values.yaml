# -- Image settings
image:
  repository: ghcr.io/faroshq/kedge-agent
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Agent settings
agent:
  # -- Edge name (required)
  edgeName: ""

  # -- Labels for this site (key=value pairs)
  labels: {}

  # -- Hub connection settings
  hub:
    # -- Hub kubeconfig (for agents that have already registered).
    # Provide via:
    # 1. existingSecret - name of a secret containing kubeconfig key
    # 2. kubeconfig - inline kubeconfig content (not recommended for production)
    existingSecret: ""
    kubeconfig: ""
    # -- Optional: kubeconfig context to use
    context: ""
    # -- Hub URL (required when using token-based bootstrap, or to override the URL in the kubeconfig)
    url: ""
    # -- One-time join token for initial agent registration.
    # Obtain with: kedge edge join-command <name>
    # The agent exchanges the token for a kubeconfig on first connect; the token is then cleared.
    # After registration, redeploy without this value (the agent saves its kubeconfig automatically).
    token: ""
    # -- Skip TLS certificate verification for the hub connection.
    # Only set to true in development/testing environments.
    insecureSkipTLSVerify: false

  # -- Optional: separate tunnel URL (defaults to hub URL from kubeconfig)
  tunnelURL: ""

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

# -- Service account
serviceAccount:
  # -- Create a service account for the agent
  create: true
  # -- Name of the service account (auto-generated if empty)
  name: ""
  # -- Annotations for the service account
  annotations: {}

# -- RBAC settings
rbac:
  # -- Create ClusterRole and ClusterRoleBinding for the agent
  # The agent needs cluster-wide permissions to manage workloads
  create: true

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}

# -- Host aliases to add to the pod (useful for dev environments)
# Example:
#   hostAliases:
#     - ip: "172.18.0.2"
#       hostnames:
#         - "kedge.localhost"
hostAliases: []
podSecurityContext:
  fsGroup: 65534
securityContext:
  runAsNonRoot: true
  runAsUser: 65534

# -- Number of replicas (typically 1 per site)
replicaCount: 1
