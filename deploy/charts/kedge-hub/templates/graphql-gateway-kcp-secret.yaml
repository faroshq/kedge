{{/*
When both embedded kcp and the graphql gateway are enabled, we pre-create an empty
placeholder Secret at the well-known name so the gateway pod can start (volume mounts
require the Secret to exist). The hub binary populates it with the actual kubeconfig
bytes at startup via --kcp-admin-kubeconfig-secret.

We also create a Role + RoleBinding granting the hub ServiceAccount the minimal
permissions needed to create and update that Secret.
*/}}
{{- if and .Values.kcp.embedded.enabled (index .Values "kubernetes-graphql-gateway" "enabled") }}
---
# Placeholder Secret for the embedded kcp admin kubeconfig.
# Populated by the hub at startup; read by the graphql gateway listener.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kedge-hub.graphqlKubeconfigSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kedge-hub.labels" . | nindent 4 }}
  annotations:
    # Keep the Secret across helm upgrades so the hub-populated data is preserved.
    helm.sh/resource-policy: keep
    kedge.faros.sh/populated-by: hub
type: Opaque
data: {}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kedge-hub.fullname" . }}-kcp-kubeconfig-writer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kedge-hub.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ include "kedge-hub.graphqlKubeconfigSecretName" . }}"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kedge-hub.fullname" . }}-kcp-kubeconfig-writer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kedge-hub.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kedge-hub.fullname" . }}-kcp-kubeconfig-writer
subjects:
  - kind: ServiceAccount
    name: {{ include "kedge-hub.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
