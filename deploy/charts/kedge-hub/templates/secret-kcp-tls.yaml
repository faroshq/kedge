{{- if and (not .Values.kcp.external.enabled) .Values.kcp.embedded.tls.selfSigned.enabled (not .Values.kcp.embedded.tls.existingSecret) (not .Values.kcp.embedded.tls.certManager.enabled) }}
{{- $fullname := include "kedge-hub.fullname" . }}
{{- $kcpServiceName := printf "%s-kcp" $fullname }}
{{- $dnsNames := concat
  (list "localhost" $kcpServiceName
    (printf "%s.%s.svc" $kcpServiceName .Release.Namespace)
    (printf "%s.%s.svc.cluster.local" $kcpServiceName .Release.Namespace)
    (printf "%s-0.%s.%s.svc" $fullname $kcpServiceName .Release.Namespace)
    (printf "%s-0.%s.%s.svc.cluster.local" $fullname $kcpServiceName .Release.Namespace))
  .Values.kcp.embedded.tls.selfSigned.dnsNames
}}
{{- $ips := list "127.0.0.1" }}
{{- range .Values.kcp.embedded.tls.selfSigned.ipAddresses }}
{{- $ips = append $ips . }}
{{- end }}
{{- $cert := genSelfSignedCert "kedge-kcp" $ips $dnsNames 365 }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kedge-hub.kcpTlsSecretName" . }}
  labels:
    {{- include "kedge-hub.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
