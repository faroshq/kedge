# -- Image settings
image:
  hub:
    repository: ghcr.io/faroshq/kedge-hub
    tag: ""  # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- kcp settings
kcp:
  # -- Embedded kcp (default, runs in-process with kedge-hub)
  embedded:
    enabled: true
    # Secure port for embedded kcp API server
    securePort: 6443
    # Bind address for embedded kcp API server (0.0.0.0 for all interfaces)
    bindAddress: "0.0.0.0"
    # Comma-separated list of batteries to include
    batteriesInclude: "admin,user"
    # -- TLS configuration for embedded kcp API server.
    # Required to avoid certificate errors when pod IP changes on restart.
    # A headless service provides stable DNS names for the StatefulSet pod.
    tls:
      # Provide an existing Secret with tls.crt and tls.key
      existingSecret: ""
      # Auto-generate self-signed cert (default, includes stable DNS names)
      selfSigned:
        enabled: true
        dnsNames: []
        ipAddresses: []
      # Use cert-manager to issue a certificate
      certManager:
        enabled: false
        issuerRef:
          name: ""
          kind: ClusterIssuer
          group: cert-manager.io
        dnsNames: []

  # -- External kcp (running outside the cluster)
  # Enable this to connect to an external kcp instance
  external:
    enabled: false
    # Kubeconfig for connecting to external kcp
    # Can be provided via:
    # 1. existingSecret - name of a secret containing admin.kubeconfig key
    # 2. kubeconfig - inline kubeconfig content (not recommended for production)
    existingSecret: ""
    kubeconfig: ""

# -- kedge-hub settings
hub:
  # Required: external URL for kubeconfig generation and OIDC callbacks
  hubExternalURL: ""
  listenAddr: ":9443"
  devMode: false
  # Enable embedded GraphQL gateway (required for portal)
  embeddedGraphQL: false
  # Static bearer tokens for access (each token creates its own user/workspace. Example: openssl rand -base64 32)
  staticAuthTokens: []
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi  # Includes embedded kcp overhead
  # -- TLS configuration for hub serving
  tls:
    # Provide an existing Secret with tls.crt and tls.key
    existingSecret: ""
    # Auto-generate self-signed cert (dev/local only)
    selfSigned:
      enabled: true
      dnsNames: []
      ipAddresses:
        - "127.0.0.1"
    # Use cert-manager to issue a certificate (recommended for production)
    certManager:
      enabled: false
      issuerRef:
        name: ""
        kind: ClusterIssuer
        group: cert-manager.io
      dnsNames: []

# -- Identity provider (OIDC) settings (see docs/idp.md)
idp:
  # Required: OIDC issuer URL reachable by hub and end-user browsers
  issuerURL: ""
  # Client ID for the OIDC provider. Must be registered as a public client
  # (no client secret) in your IdP (e.g. Dex: public: true).
  clientID: "kedge"
  # Optional: name of a secret in the release namespace whose `ca.crt` (or
  # `tls.crt`) holds the PEM CA bundle for the IdP. When set, the secret is
  # mounted into the hub pod and `--idp-ca-file` is passed so embedded kcp
  # can verify the IdP's TLS cert. Required when issuerURL is https with a
  # self-signed / private CA (e.g. dev Dex).
  caSecretName: ""
  # Key inside the caSecretName secret holding the CA bundle.
  caSecretKey: "ca.crt"

# -- kcp data PVC (used for embedded kcp data and hub state)
persistence:
  size: 10Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

# -- Service configuration
service:
  type: ClusterIP
  hub:
    port: 9443

# -- Ingress (optional, passthrough to hub TLS)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  #  - host: kedge.example.com
  #    paths:
  #      - path: /
  #        pathType: ImplementationSpecific

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
# -- Extra /etc/hosts entries injected into the hub pod. Used in the external
# kcp dev flow to make the short name `kcp` (from kcp's --shard-base-url)
# resolve from kedge-system — the APIExportEndpointSlice URLs kcp advertises
# use the bare service name.
hostAliases: []
# - ip: 10.96.0.42
#   hostnames:
#     - kcp
podSecurityContext:
  fsGroup: 65534
securityContext:
  runAsNonRoot: true
  runAsUser: 65534
