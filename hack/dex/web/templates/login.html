{{ template "header.html" . }}

<div class="theme-panel">
  <h2 class="theme-heading">Sign in to kedge</h2>
  <p class="dex-subtitle">Choose a provider to continue.</p>
  <div class="login-providers">
    {{ range $c := .Connectors }}
      <div class="theme-form-row">
        <a href="{{ $c.URL }}" target="_self">
          <button class="dex-btn theme-btn-provider">
            <span class="dex-btn-icon dex-btn-icon--{{ $c.Type }}"></span>
            <span class="dex-btn-text">Continue with {{ $c.Name }}</span>
          </button>
        </a>
      </div>
    {{ end }}
  </div>
  <p class="dex-footer-text">By signing in you agree to the kedge terms and privacy policy.</p>
</div>

{{ template "footer.html" . }}
