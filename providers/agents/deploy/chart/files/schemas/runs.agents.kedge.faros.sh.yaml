metadata:
  name: v260714-9965166.runs.agents.kedge.faros.sh
spec:
  group: agents.kedge.faros.sh
  names:
    kind: Run
    listKind: RunList
    plural: runs
    shortNames:
    - run
    singular: run
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.agentRef
      name: Agent
      type: string
    - jsonPath: .spec.trigger
      name: Trigger
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
