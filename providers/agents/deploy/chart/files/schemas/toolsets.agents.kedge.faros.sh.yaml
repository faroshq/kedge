apiVersion: apis.kcp.io/v1alpha1
kind: APIResourceSchema
metadata:
  name: v260714-8e565fc.toolsets.agents.kedge.faros.sh
spec:
  group: agents.kedge.faros.sh
  names:
    kind: Toolset
    listKind: ToolsetList
    plural: toolsets
    shortNames:
    - ts
    singular: toolset
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: Display
      type: string
    name: v1alpha1
    schema:
      description: |-
        Toolset is a named, reusable bundle of tool grants — built-in families plus
        connection-backed tools and approval rules — that many Agents can link and
        share. An agent references toolsets from its per-class tool policy; at run
        time their families/connections/approval are merged into the agent's grant.
      properties:
        apiVersion:
          description: |-
            APIVersion defines the versioned schema of this representation of an object.
            Servers should convert recognized schemas to the latest internal value, and
            may reject unrecognized values.
            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
          type: string
        kind:
          description: |-
            Kind is a string value representing the REST resource this object represents.
            Servers may infer this from the endpoint the client submits requests to.
            Cannot be updated.
            In CamelCase.
            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
          type: string
        metadata:
          type: object
        spec:
          description: ToolsetSpec is the user-authored bundle definition.
          properties:
            connections:
              description: |-
                Connections names Connection resources (e.g. mcp/github) whose tools this
                toolset exposes.
              items:
                type: string
              type: array
            description:
              description: Description explains what the toolset is for.
              maxLength: 1024
              type: string
            displayName:
              description: DisplayName is a human-friendly label.
              maxLength: 253
              type: string
            families:
              description: |-
                Families names built-in tool families to include: "core", "web",
                "github", "mcp", "edges".
              items:
                type: string
              type: array
            requireApproval:
              description: |-
                RequireApproval lists tool names (or wildcards like "github:*") that must
                be approved by the user before they run.
              items:
                type: string
              type: array
          type: object
        status:
          description: ToolsetStatus is the observed toolset state.
          properties:
            usedBy:
              description: UsedBy counts the agents currently linking this toolset.
                Informational.
              format: int32
              type: integer
          type: object
      type: object
    served: true
    storage: true
    subresources:
      status: {}
