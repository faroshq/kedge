---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: deploykeys.code.kedge.faros.sh
spec:
  group: code.kedge.faros.sh
  names:
    categories:
    - kedge
    kind: DeployKey
    listKind: DeployKeyList
    plural: deploykeys
    shortNames:
    - gkey
    singular: deploykey
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.repositoryRef
      name: Repository
      type: string
    - jsonPath: .spec.readOnly
      name: ReadOnly
      type: boolean
    - jsonPath: .status.keyID
      name: KeyID
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          DeployKey grants SSH access to a single Repository. It is the cross-provider
          seam: when spec.publicKey is empty the controller generates a keypair,
          registers the public half on the repository, and writes the private half to
          a Secret in the tenant workspace (status.secretRef, owned by this CR so it
          is garbage-collected on delete). Another provider (e.g. infrastructure) can
          then mount that Secret to clone/push.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DeployKeySpec is the desired state.
            properties:
              publicKey:
                description: |-
                  PublicKey is an OpenSSH-format public key to register (bring your
                  own). When empty the controller generates an ed25519 keypair and
                  writes the private half to status.secretRef.
                maxLength: 8192
                type: string
              readOnly:
                description: ReadOnly registers the key without write (push) access.
                type: boolean
              repositoryRef:
                description: |-
                  RepositoryRef names the Repository (same workspace) this key is
                  installed on.
                maxLength: 253
                minLength: 1
                type: string
              title:
                description: |-
                  Title is the human-readable label shown on the host. Empty uses
                  metadata.name.
                maxLength: 255
                type: string
            required:
            - repositoryRef
            type: object
          status:
            description: DeployKeyStatus is the observed state.
            properties:
              conditions:
                description: Conditions follows the standard Kubernetes conditions
                  pattern.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              keyID:
                description: KeyID is the host-side id of the registered key.
                maxLength: 64
                type: string
              observedGeneration:
                description: ObservedGeneration mirrors metadata.generation last reconciled.
                format: int64
                type: integer
              secretRef:
                description: |-
                  SecretRef points at the Secret holding the generated private key
                  (key "ssh-privatekey"). Only set when the controller generated the
                  keypair (spec.publicKey was empty). The Secret is owned by this CR.
                properties:
                  key:
                    description: |-
                      Key is the entry within the Secret's data holding the value. For a
                      Connection PAT this defaults to "token"; for a DeployKey private
                      key the controller writes "ssh-privatekey".
                    maxLength: 253
                    type: string
                  name:
                    description: Name of the Secret.
                    maxLength: 253
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace of the Secret. Empty resolves to the provider's
                      convention namespace ("default").
                    maxLength: 253
                    type: string
                required:
                - name
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
