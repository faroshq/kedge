---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: packages.code.kedge.faros.sh
spec:
  group: code.kedge.faros.sh
  names:
    categories:
    - kedge
    kind: Package
    listKind: PackageList
    plural: packages
    shortNames:
    - gpkg
    singular: package
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.repositoryRef
      name: Repository
      type: string
    - jsonPath: .status.packageName
      name: Package
      type: string
    - jsonPath: .status.type
      name: Type
      type: string
    - jsonPath: .status.versionCount
      name: Versions
      type: integer
    - jsonPath: .status.lastSyncTime
      name: Synced
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Package is the observed set of artifacts (container image, npm/maven package,
          …) published under a Repository on the git host. Unlike the other code-provider
          CRs it is NOT tenant-authored desired state: the PackageController (a crawler)
          lists the host on a timer and reconciles one Package CR per published package,
          so the portal can read them straight from kcp instead of hitting the host on
          every page view (which GitHub rate-limits hard). Each Package is owned by its
          Repository via an OwnerReference, so host packages disappear from kcp when the
          Repository CR is deleted.

          All descriptive fields live in status because the whole object is observed,
          never desired; spec carries only the link back to the owning Repository.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PackageSpec links the Package back to its owning Repository. Authored by the
              PackageController on create and immutable thereafter — everything observed is
              in status.
            properties:
              repositoryRef:
                description: |-
                  RepositoryRef names the Repository (same workspace) this package is
                  published under. Also mirrored onto the LabelRepository label so the
                  portal can list a repository's packages with a label selector.
                maxLength: 253
                minLength: 1
                type: string
            required:
            - repositoryRef
            type: object
          status:
            description: PackageStatus is the observed package metadata as last crawled
              from the host.
            properties:
              conditions:
                description: Conditions follows the standard Kubernetes conditions
                  pattern.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              htmlURL:
                description: HTMLURL links to the package's browser page.
                maxLength: 2048
                type: string
              imageRepository:
                description: |-
                  ImageRepository is the pullable registry path (no tag/digest) for image
                  packages, e.g. "ghcr.io/owner/repo/component". Combine with a version's
                  digest to form a deployable reference. Empty for non-image packages.
                maxLength: 512
                type: string
              lastSyncTime:
                description: LastSyncTime is when the crawler last refreshed this
                  package from the host.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration mirrors metadata.generation last reconciled.
                format: int64
                type: integer
              packageName:
                description: |-
                  PackageName is the package's name on the host (the artifact name, which
                  may differ from the Kubernetes object name).
                maxLength: 255
                type: string
              type:
                description: 'Type is the package ecosystem: container | docker |
                  npm | maven | rubygems | nuget.'
                maxLength: 32
                type: string
              updatedAt:
                description: UpdatedAt is the host's last-updated time in RFC3339,
                  or "" when unknown.
                maxLength: 64
                type: string
              versionCount:
                description: VersionCount is how many versions the host reports (0
                  when unknown).
                format: int64
                type: integer
              versions:
                description: |-
                  Versions is a bounded, most-recent-first list of the package's published
                  versions with their tags and digest (populated for container/docker
                  packages). It lets consumers resolve a build tag such as "sha-<commit>"
                  to an immutable image digest.
                items:
                  description: |-
                    PackageVersion is one published version of a package: an immutable digest and
                    the tags pointing at it (a container image push creates one version).
                  properties:
                    createdAt:
                      description: CreatedAt is the version's creation time in RFC3339,
                        or "" when unknown.
                      maxLength: 64
                      type: string
                    digest:
                      description: Digest is the version's immutable content digest,
                        e.g. "sha256:…".
                      maxLength: 256
                      type: string
                    tags:
                      description: Tags are the tags pointing at this digest (e.g.
                        "sha-<commit>", "latest").
                      items:
                        type: string
                      maxItems: 64
                      type: array
                  type: object
                maxItems: 100
                type: array
              visibility:
                description: Visibility is "public", "internal", or "private" (host-reported;
                  may be empty).
                maxLength: 32
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
