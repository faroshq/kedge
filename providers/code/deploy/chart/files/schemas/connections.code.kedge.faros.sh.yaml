apiVersion: apis.kcp.io/v1alpha1
kind: APIResourceSchema
metadata:
  name: v260609-fc69fa2.connections.code.kedge.faros.sh
spec:
  group: code.kedge.faros.sh
  names:
    categories:
    - kedge
    kind: Connection
    listKind: ConnectionList
    plural: connections
    shortNames:
    - gconn
    singular: connection
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.provider
      name: Provider
      type: string
    - jsonPath: .spec.owner
      name: Owner
      type: string
    - jsonPath: .status.login
      name: Login
      type: string
    - jsonPath: .status.conditions[?(@.type=="Validated")].status
      name: Validated
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      description: |-
        Connection binds a tenant to one git hosting account. It is the
        credential anchor that Repository / DeployKey / Collaborator reference:
        every git operation runs against the account this Connection authenticates.

        The credential itself never lives on the CR — spec.secretRef points at a
        Secret in the tenant workspace holding the token. The ConnectionController
        resolves that Secret, calls the git host to verify it, and records the
        authenticated login + granted scopes in status.

        Credential type is pluggable via spec.type so the PAT model shipped in v1
        can grow a GitHub App installation or OAuth flow later without changing any
        consumer of this CR.
      properties:
        apiVersion:
          description: |-
            APIVersion defines the versioned schema of this representation of an object.
            Servers should convert recognized schemas to the latest internal value, and
            may reject unrecognized values.
            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
          type: string
        kind:
          description: |-
            Kind is a string value representing the REST resource this object represents.
            Servers may infer this from the endpoint the client submits requests to.
            Cannot be updated.
            In CamelCase.
            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
          type: string
        metadata:
          type: object
        spec:
          description: ConnectionSpec is the desired state.
          properties:
            baseURL:
              description: |-
                BaseURL overrides the default git host endpoint for self-hosted
                installs (GitHub Enterprise Server, self-managed GitLab). Empty
                targets the provider's public SaaS endpoint.
              maxLength: 2048
              type: string
            owner:
              description: |-
                Owner is the org or user under which repositories created via this
                Connection land. Must be an account the credential can write to.
              maxLength: 100
              minLength: 1
              type: string
            provider:
              description: 'Provider names the git hosting sub-provider. v1: github.'
              enum:
              - github
              type: string
            secretRef:
              description: |-
                SecretRef points at the Secret in the tenant workspace holding the
                credential. For type=pat the default key is "token".
              properties:
                key:
                  description: |-
                    Key is the entry within the Secret's data holding the value. For a
                    Connection PAT this defaults to "token"; for a DeployKey private
                    key the controller writes "ssh-privatekey".
                  maxLength: 253
                  type: string
                name:
                  description: Name of the Secret.
                  maxLength: 253
                  minLength: 1
                  type: string
                namespace:
                  description: |-
                    Namespace of the Secret. Empty resolves to the provider's
                    convention namespace ("default").
                  maxLength: 253
                  type: string
              required:
              - name
              type: object
            type:
              description: 'Type selects the credential model. v1: pat.'
              enum:
              - pat
              - github-app
              - oauth
              type: string
          required:
          - owner
          - provider
          - secretRef
          - type
          type: object
        status:
          description: ConnectionStatus is the observed state.
          properties:
            conditions:
              description: |-
                Conditions follows the standard Kubernetes conditions pattern. The
                Validated condition is True once the credential authenticates.
              items:
                description: Condition contains details for one aspect of the current
                  state of this API Resource.
                properties:
                  lastTransitionTime:
                    description: |-
                      lastTransitionTime is the last time the condition transitioned from one status to another.
                      This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                    format: date-time
                    type: string
                  message:
                    description: |-
                      message is a human readable message indicating details about the transition.
                      This may be an empty string.
                    maxLength: 32768
                    type: string
                  observedGeneration:
                    description: |-
                      observedGeneration represents the .metadata.generation that the condition was set based upon.
                      For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                      with respect to the current state of the instance.
                    format: int64
                    minimum: 0
                    type: integer
                  reason:
                    description: |-
                      reason contains a programmatic identifier indicating the reason for the condition's last transition.
                      Producers of specific condition types may define expected values and meanings for this field,
                      and whether the values are considered a guaranteed API.
                      The value should be a CamelCase string.
                      This field may not be empty.
                    maxLength: 1024
                    minLength: 1
                    pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                    type: string
                  status:
                    description: status of the condition, one of True, False, Unknown.
                    enum:
                    - "True"
                    - "False"
                    - Unknown
                    type: string
                  type:
                    description: type of condition in CamelCase or in foo.example.com/CamelCase.
                    maxLength: 316
                    pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                    type: string
                required:
                - lastTransitionTime
                - message
                - reason
                - status
                - type
                type: object
              type: array
              x-kubernetes-list-map-keys:
              - type
              x-kubernetes-list-type: map
            login:
              description: |-
                Login is the authenticated account the credential resolved to
                (e.g. the GitHub login). Empty until first successful validation.
              maxLength: 100
              type: string
            observedGeneration:
              description: ObservedGeneration mirrors metadata.generation last reconciled.
              format: int64
              type: integer
            scopes:
              description: |-
                Scopes lists the granted token scopes the git host reported, when
                discoverable (GitHub returns them on the X-OAuth-Scopes header).
              items:
                type: string
              type: array
          type: object
      required:
      - spec
      type: object
    served: true
    storage: true
    subresources:
      status: {}
