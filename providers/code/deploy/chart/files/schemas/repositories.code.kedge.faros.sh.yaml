  names:
    categories:
    - kedge
    kind: Repository
    listKind: RepositoryList
    plural: repositories
    shortNames:
    - grepo
    singular: repository
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.connectionRef
      name: Connection
      type: string
    - jsonPath: .spec.name
      name: Repo
      type: string
    - jsonPath: .spec.visibility
      name: Visibility
      type: string
    - jsonPath: .status.htmlURL
