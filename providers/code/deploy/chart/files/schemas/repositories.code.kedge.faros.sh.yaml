    name: v1alpha1
    schema:
      description: |-
        Repository is the desired state for one git repository on the host the
        referenced Connection authenticates. The RepositoryController creates (and,
        on delete, removes) the repo via the sub-provider backend and records its
        URLs + host-side id in status.
      properties:
        apiVersion:
          description: |-
            APIVersion defines the versioned schema of this representation of an object.
            Servers should convert recognized schemas to the latest internal value, and
            may reject unrecognized values.
            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
          type: string
        kind:
          description: |-
            Kind is a string value representing the REST resource this object represents.
            Servers may infer this from the endpoint the client submits requests to.
            Cannot be updated.
            In CamelCase.
            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
          type: string
        metadata:
          type: object
        spec:
          description: RepositorySpec is the desired state.
          properties:
            autoInit:
              description: |-
                AutoInit creates an initial commit (README) so the repository has a
                default branch immediately. Required if DeployKeys/clones must
                succeed right after creation.
              type: boolean
            connectionRef:
              description: ConnectionRef names the Connection (same workspace) whose
                credential
              maxLength: 253
              minLength: 1
              type: string
            defaultBranch:
              description: |-
                DefaultBranch names the initial default branch. Empty uses the host
                default (e.g. "main").
              maxLength: 255
              type: string
            description:
              description: Description is set as the repository description on the
                host.
              maxLength: 2048
              type: string
            name:
              description: |-
                Name is the repository name on the git host (the path segment after
                the owner). DNS-ish; the host enforces its own rules.
              maxLength: 100
              minLength: 1
              type: string
            owner:
              description: |-
                Owner overrides the Connection's owner for this single repository
                (e.g. to create under a different org the same credential controls).
                Empty inherits Connection.spec.owner.
              maxLength: 100
              type: string
            visibility:
              description: Visibility defaults to private when empty.
              enum:
              - private
              - public
              - internal
              type: string
          required:
          - connectionRef
          - name
          type: object
        status:
          description: RepositoryStatus is the observed state.
          properties:
            cloneURL:
              description: CloneURL is the HTTPS clone URL.
              maxLength: 2048
              type: string
            conditions:
              description: Conditions follows the standard Kubernetes conditions pattern.
              items:
                description: Condition contains details for one aspect of the current
                  state of this API Resource.
                properties:
                  lastTransitionTime:
                    description: |-
                      lastTransitionTime is the last time the condition transitioned from one status to another.
                      This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                    format: date-time
                    type: string
                  message:
                    description: |-
                      message is a human readable message indicating details about the transition.
                      This may be an empty string.
                    maxLength: 32768
                    type: string
                  observedGeneration:
                    description: |-
                      observedGeneration represents the .metadata.generation that the condition was set based upon.
                      For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                      with respect to the current state of the instance.
                    format: int64
                    minimum: 0
                    type: integer
                  reason:
                    description: |-
                      reason contains a programmatic identifier indicating the reason for the condition's last transition.
                      Producers of specific condition types may define expected values and meanings for this field,
                      and whether the values are considered a guaranteed API.
                      The value should be a CamelCase string.
                      This field may not be empty.
                    maxLength: 1024
                    minLength: 1
                    pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                    type: string
                  status:
                    description: status of the condition, one of True, False, Unknown.
                    enum:
                    - "True"
                    - "False"
                    - Unknown
                    type: string
                  type:
                    description: type of condition in CamelCase or in foo.example.com/CamelCase.
                    maxLength: 316
                    pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                    type: string
                required:
                - lastTransitionTime
                - message
                - reason
                - status
                - type
                type: object
              type: array
              x-kubernetes-list-map-keys:
              - type
              x-kubernetes-list-type: map
            htmlURL:
              description: HTMLURL is the browser URL of the repository.
              maxLength: 2048
              type: string
            observedGeneration:
              description: ObservedGeneration mirrors metadata.generation last reconciled.
              format: int64
              type: integer
            repoID:
              description: RepoID is the host-side numeric/opaque id of the repository.
              maxLength: 64
              type: string
            sshURL:
              description: SSHURL is the SSH clone URL (used together with a DeployKey).
              maxLength: 2048
              type: string
          type: object
      required:
      - spec
      type: object
    served: true
    storage: true
    subresources:
      status: {}
