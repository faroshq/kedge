apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "code.fullname" . }}
  labels:
    {{- include "code.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "code.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "code.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "code.serviceAccountName" . }}
      initContainers:
        # Bootstrap the provider workspace (APIResourceSchemas, APIExport,
        # APIExportEndpointSlice, bind grant) using the SAME workspace-admin
        # kubeconfig the serve container runs with. The kubeconfig is minted by
        # the platform admin via /bonkers (admin onboarding) and supplied as the
        # providerKubeconfig Secret. Schemas are baked into the image at
        # /etc/kedge/schemas (see Dockerfile). Idempotent.
        - name: init
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["init"]
          env:
            - name: KEDGE_PROVIDER_KUBECONFIG
              value: /var/run/secrets/kedge/kedge-provider-kubeconfig
            - name: KEDGE_SCHEMAS_DIR
              value: /etc/kedge/schemas
          volumeMounts:
            - name: kedge-provider-kubeconfig
              mountPath: /var/run/secrets/kedge
              readOnly: true
      containers:
        - name: provider
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
          env:
            - name: PORT
              value: "8083"
            - name: KEDGE_HUB_URL
              value: {{ .Values.hub.url | quote }}
            - name: KEDGE_PROVIDER_NAME
              value: "code"
            {{- if .Values.hub.insecure }}
            - name: KEDGE_HUB_INSECURE
              value: "true"
            {{- end }}
            {{- if .Values.hub.tokenSecretRef.name }}
            - name: KEDGE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hub.tokenSecretRef.name }}
                  key: {{ .Values.hub.tokenSecretRef.key }}
            {{- end }}
            # Points the multicluster controller manager at the onboarded
            # provider kubeconfig (mounted below).
            - name: KEDGE_PROVIDER_KUBECONFIG
              value: /var/run/secrets/kedge/kedge-provider-kubeconfig
            {{- if .Values.tenant.credentialsNamespace }}
            - name: KEDGE_TENANT_CREDENTIALS_NAMESPACE
              value: {{ .Values.tenant.credentialsNamespace | quote }}
            {{- end }}
            {{- if .Values.githubOAuth.enabled }}
            # GitHub "Connect with GitHub" OAuth flow. When disabled the portal
            # falls back to the pasted-PAT form (see README).
            - name: GITHUB_OAUTH_CLIENT_ID
              value: {{ .Values.githubOAuth.clientId | quote }}
            {{- if .Values.githubOAuth.clientSecretRef.name }}
            - name: GITHUB_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.githubOAuth.clientSecretRef.name }}
                  key: {{ .Values.githubOAuth.clientSecretRef.key }}
            {{- end }}
            - name: GITHUB_OAUTH_REDIRECT_URL
              value: {{ .Values.githubOAuth.redirectURL | quote }}
            {{- if .Values.githubOAuth.portalOrigin }}
            - name: GITHUB_OAUTH_PORTAL_ORIGIN
              value: {{ .Values.githubOAuth.portalOrigin | quote }}
            {{- end }}
            {{- if .Values.githubOAuth.scopes }}
            - name: GITHUB_OAUTH_SCOPES
              value: {{ .Values.githubOAuth.scopes | quote }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: kedge-provider-kubeconfig
              mountPath: /var/run/secrets/kedge
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: kedge-provider-kubeconfig
          secret:
            # Required input: the workspace-admin kubeconfig minted by the
            # platform admin via /bonkers (admin onboarding). Both the init
            # container and the serve container mount it. The pod waits for the
            # Secret to exist — create it before/at install from the onboard
            # response.
            secretName: {{ .Values.providerKubeconfig.secretName }}
            items:
              - key: kubeconfig
                path: kedge-provider-kubeconfig
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
