apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "code.fullname" . }}
  labels:
    {{- include "code.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "code.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "code.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "code.serviceAccountName" . }}
      containers:
        - name: provider
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
          env:
            - name: PORT
              value: "8083"
            - name: KEDGE_HUB_URL
              value: {{ .Values.hub.url | quote }}
            - name: KEDGE_PROVIDER_NAME
              value: "code"
            {{- if .Values.hub.insecure }}
            - name: KEDGE_HUB_INSECURE
              value: "true"
            {{- end }}
            {{- if .Values.hub.tokenSecretRef.name }}
            - name: KEDGE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hub.tokenSecretRef.name }}
                  key: {{ .Values.hub.tokenSecretRef.key }}
            {{- end }}
            # Points the multicluster controller manager at the hub-minted
            # provider kubeconfig (mounted below).
            - name: CODE_KUBECONFIG
              value: /var/run/secrets/kedge/kedge-provider-kubeconfig
            - name: CODE_COMMIT_BUNDLE_DIR
              value: {{ .Values.bundleStore.path | quote }}
            {{- if .Values.tenant.credentialsNamespace }}
            - name: KEDGE_TENANT_CREDENTIALS_NAMESPACE
              value: {{ .Values.tenant.credentialsNamespace | quote }}
            {{- end }}
            {{- if .Values.githubOAuth.enabled }}
            # GitHub "Connect with GitHub" OAuth flow. When disabled the portal
            # falls back to the pasted-PAT form (see README).
            - name: GITHUB_OAUTH_CLIENT_ID
              value: {{ .Values.githubOAuth.clientId | quote }}
            {{- if .Values.githubOAuth.clientSecretRef.name }}
            - name: GITHUB_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.githubOAuth.clientSecretRef.name }}
                  key: {{ .Values.githubOAuth.clientSecretRef.key }}
            {{- end }}
            - name: GITHUB_OAUTH_REDIRECT_URL
              value: {{ .Values.githubOAuth.redirectURL | quote }}
            {{- if .Values.githubOAuth.portalOrigin }}
            - name: GITHUB_OAUTH_PORTAL_ORIGIN
              value: {{ .Values.githubOAuth.portalOrigin | quote }}
            {{- end }}
            {{- if .Values.githubOAuth.scopes }}
            - name: GITHUB_OAUTH_SCOPES
              value: {{ .Values.githubOAuth.scopes | quote }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: kedge-provider-kubeconfig
              mountPath: /var/run/secrets/kedge
              readOnly: true
            - name: commit-bundles
              mountPath: {{ .Values.bundleStore.path | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: kedge-provider-kubeconfig
          secret:
            # Hub-provisioned: optional so the pod stays schedulable while the
            # hub catalog controller mints the Secret. The provider serves
            # MCP/portal reads meanwhile; the controller manager starts once the
            # kubeconfig appears (pod restart on Secret mount).
            secretName: {{ .Values.providerKubeconfig.secretName }}
            optional: true
            items:
              - key: kubeconfig
                path: kedge-provider-kubeconfig
        - name: commit-bundles
          {{- if .Values.bundleStore.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.bundleStore.existingClaim | quote }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
