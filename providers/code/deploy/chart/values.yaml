## kedge-code-provider values
## See providers/code/README.md for the deploy guide and the credential /
## GitHub OAuth conventions the portal expects.

# Container image. Build with: docker build -t IMAGE providers/code/
image:
  repository: ghcr.io/faroshq/kedge-code-provider
  tag: ""  # empty → defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Number of Deployment replicas. Keep this at 1 unless bundleStore.existingClaim
# points at shared storage: commit_files writes provider-owned bundles to disk
# and the RepositoryCommit controller must read the same bytes.
replicaCount: 1

service:
  type: ClusterIP
  port: 8083

# Hub the provider POSTs heartbeats to. Must be reachable from the provider pod
# (in-cluster Service DNS works).
hub:
  url: https://kedge-hub.kedge.svc.cluster.local:9443
  # Bearer token used in the heartbeat POST. Provided as a Secret because it
  # MUST NOT land in values.yaml in plaintext for prod.
  tokenSecretRef:
    name: kedge-code-hub-token
    key: token
  # Skip TLS verification on heartbeat — dev only, defaults off.
  insecure: false

# Secret the provider mounts read-only at
# /var/run/secrets/kedge/kedge-provider-kubeconfig to reach kcp (CODE_KUBECONFIG).
# The hub catalog controller mints it when it reconciles the CatalogEntry; the
# volume is `optional`, so the pod stays schedulable and serves portal/MCP reads
# until the Secret appears — the multicluster controller manager engages once it
# does (pod restart on Secret mount).
providerKubeconfig:
  secretName: kedge-provider-kubeconfig

# GitHub "Connect with GitHub" OAuth App (optional). When enabled, the portal
# shows a "Connect with GitHub" button and mints OAuth tokens (with read:packages
# so the repository Packages panel works). Leave disabled to use pasted Personal
# Access Tokens only — repositories, deploy keys, collaborators all work with a
# PAT; OAuth just removes the copy-paste step.
githubOAuth:
  enabled: false
  # GitHub OAuth App client ID.
  clientId: ""
  # The client secret is read from a Secret you create — never put it in
  # values.yaml in plaintext for prod.
  clientSecretRef:
    name: ""
    key: clientSecret
  # Absolute callback URL registered on the GitHub OAuth App. It is a top-level
  # redirect from GitHub (no kedge auth), so it must be publicly reachable and
  # forward to the provider's HTTP backend. Two options — both end in /callback:
  #   1. Reuse the hub ingress via its /services proxy (no extra ingress needed):
  #      https://<hub-host>/services/providers/code/oauth/github/callback
  #   2. The provider's own externally-reachable host:
  #      https://code.example.com/oauth/github/callback
  # The matching /start URL is derived by swapping /callback → /start under the
  # same host+path prefix.
  redirectURL: ""
  # postMessage target origin the popup returns the token to (the hub/portal
  # origin). Empty broadcasts to "*" — set this in production.
  portalOrigin: ""
  # Comma-separated scopes. Empty → provider default
  # (repo,read:org,admin:public_key,read:packages).
  scopes: ""

# Tenant credential resolution. Empty → the provider default ("default"), the
# namespace the portal writes Connection token Secrets into. Override only if an
# admin pushes credential Secrets into a namespace tenants cannot write to.
tenant:
  credentialsNamespace: ""

# RepositoryCommit source bundles. The CR stores only a bundle ref/digest; the
# generated file contents live here until the controller commits them.
bundleStore:
  path: /var/lib/kedge-code/commit-bundles
  # Use an existing PVC instead of rendering one.
  existingClaim: ""
  # Explicit non-durable fallback for throwaway/dev deployments.
  emptyDir: false
  persistence:
    enabled: true
    size: 1Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""

# When true, the chart renders the CatalogEntry (which registers the provider
# with the hub) into a ConfigMap that the init container applies into the
# provider workspace via the provider kubeconfig. The CatalogEntry is a kcp
# resource, so it is NOT applied to the hosting cluster this chart installs into.
# Set to false to manage the CatalogEntry separately (e.g. GitOps with a
# different rollout cadence).
catalogEntry:
  enabled: true

serviceAccount:
  create: true
  name: ""   # empty → release-name

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Optional name overrides + pod-level scheduling controls.
nameOverride: ""
fullnameOverride: ""
podLabels: {}
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
