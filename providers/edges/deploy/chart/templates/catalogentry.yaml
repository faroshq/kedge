{{- if .Values.catalogEntry.enabled -}}
# CatalogEntry registers this provider with the kedge hub (routing + portal
# Enable flow). It is a kcp resource (providers.kedge.faros.sh/v1alpha1), so it
# MUST NOT be applied to the hosting cluster. The chart renders it into a
# ConfigMap that the init container mounts and applies into the provider
# workspace via the provider kubeconfig (KEDGE_CATALOGENTRY_FILE ->
# sdkinstall.Bootstrap). backend.url points at the in-cluster Service so the hub
# backend proxy forwards /services/providers/edges/* (agent ingress + edgeproxy)
# here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "edges.fullname" . }}-catalogentry
  labels:
    {{- include "edges.labels" . | nindent 4 }}
data:
  catalogentry.yaml: |
    apiVersion: providers.kedge.faros.sh/v1alpha1
    kind: CatalogEntry
    metadata:
      name: edges
    spec:
      displayName: "Edges"
      description: "Connect and manage Kubernetes clusters and Linux/SSH servers as edges: kubectl and SSH through the hub reverse tunnel, plus the edge MCP endpoint."
      vendor: "kedge"
      version: {{ .Chart.AppVersion | quote }}
      category: "Edges"
      # Grants the provider SA get/list/watch/proxy on the edge kinds in the
      # tenant workspace on Enable (join-token validation + SSH creds reads).
      edgeProxyAccess: true
      ui:
        url: "http://{{ include "edges.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"
        indexPath: "/"
        # Sub-nav items under the Edges parent in the sidebar. Must match
        # manifest.yaml. Workloads → /providers/edges/workloads;
        # Services → /providers/edges/services.
        children:
          - displayName: Workloads
            builtinRoute: workloads
          - displayName: Services
            builtinRoute: services
      backend:
        url: "http://{{ include "edges.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"
        healthPath: "/healthz"
      apiExport:
        name: "edges.providers.kedge.faros.sh"
        permissionClaims:
          - group: ""
            resource: namespaces
            verbs: [get, list, watch, create, update, patch, delete]
            tenantScoped: true
          - group: ""
            resource: serviceaccounts
            verbs: [get, list, watch, create, update, patch, delete]
            tenantScoped: true
          - group: ""
            resource: secrets
            verbs: [get, list, watch, create, update, patch, delete]
            tenantScoped: true
          - group: rbac.authorization.k8s.io
            resource: clusterroles
            verbs: [get, list, watch, create, update, patch, delete]
            tenantScoped: true
          - group: rbac.authorization.k8s.io
            resource: clusterrolebindings
            verbs: [get, list, watch, create, update, patch, delete]
            tenantScoped: true
          # Delegated authn/authz for the data plane (kcp#4279 / kcp#4280): the
          # provider validates presented tokens and authorizes the resolved
          # identity against the consumer workspace via the APIExport VW. Must
          # match manifest.yaml + init_cmd.go. tenantScoped: the VW confines each
          # review to the tenant's OWN workspace (bounded → auto-acceptable, no
          # "reach beyond your workspace" warning). Built-in review APIs: create only.
          - group: authentication.k8s.io
            resource: tokenreviews
            verbs: [create]
            tenantScoped: true
          - group: authorization.k8s.io
            resource: subjectaccessreviews
            verbs: [create]
            tenantScoped: true
{{- end }}
