{{- if .Values.catalogEntry.enabled -}}
# CatalogEntry registers this provider with the kedge hub. The hub's
# catalog controller picks it up, materializes
# root:kedge:providers:kro-multicluster, mints
# kedge-provider-kubeconfig into our serviceAccountNamespace, and
# applies the (empty in v1) APIResourceSchema set.
#
# Phase 1 ships schemas: []. Tenants APIBind the resulting APIExport
# purely to grant this provider the `secrets get/list/watch`
# permission claim — there's no kedge-side CRD for tenants to use
# yet (the broker model puts the UI in front of the work).
apiVersion: providers.kedge.faros.sh/v1alpha1
kind: CatalogEntry
metadata:
  name: kro-multicluster
  labels:
    {{- include "kro-mc.labels" . | nindent 4 }}
spec:
  displayName: "Application Templates"
  description: "Provision applications and infrastructure from curated kro templates."
  vendor: "kedge"
  version: {{ .Chart.AppVersion | quote }}
  category: "Workloads"
  iconURL: "/ui/providers/kro-multicluster/icon.svg"
  serviceAccountNamespace: {{ .Release.Namespace }}
  ui:
    url: "http://{{ include "kro-mc.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"
    indexPath: "/"
    # Sub-nav entries surfaced indented under "Application Templates"
    # in the portal side menu. The portal composes each child URL as
    # /providers/kro-multicluster/{builtinRoute}; the kro micro-frontend
    # picks up the trailing segment via kedgeContext.subPath and routes
    # to the matching page (see providers/kromulticluster/portal/src/App.vue).
    # Mirrors how kubernetes-edges exposes "Workloads".
    children:
      - displayName: Templates
        builtinRoute: templates
      - displayName: Instances
        builtinRoute: instances
  backend:
    url: "http://{{ include "kro-mc.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"
    healthPath: "/healthz"
  apiExport:
    name: "kromulticluster.providers.kedge.faros.sh"
    permissionClaims:
      - resource: secrets
        verbs: [get, list, watch]
        tenantScoped: true
    schemas: []
{{- end }}
