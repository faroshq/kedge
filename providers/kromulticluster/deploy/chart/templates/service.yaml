apiVersion: v1
kind: Service
metadata:
  name: {{ include "kro-mc.fullname" . }}
  labels:
    {{- include "kro-mc.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "kro-mc.selectorLabels" . | nindent 4 }}
